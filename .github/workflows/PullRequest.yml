name: pull request

on:
  pull_request:
    paths:
      - 'source/**'

jobs:
  pull_request:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-dotnet@v6
      with:
        dotnet-version: '10.0.x'
        
    - name: Build
      run: dotnet build source -c Release -p:TreatWarningsAsErrors=true
      
    - name: Run tests net48
      run: dotnet test source -c Release -f net48 --no-build

    - name: Run tests net10.0
      run: dotnet test source -c Release -f net10.0 --no-build